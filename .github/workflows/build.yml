name: Build and Push Docker Image

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Phala after build'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: generalsemantics/hermes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output digest
        run: |
          echo "## Docker Image Attestation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification" >> $GITHUB_STEP_SUMMARY
          echo "To verify the Phala TEE attestation matches this build:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 1. Get attestation from Phala dashboard or /attestation endpoint" >> $GITHUB_STEP_SUMMARY
          echo "# 2. Compare the image digest in vm_config with:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Generate compose file
        env:
          GIT_SHA_FULL: ${{ github.sha }}
          IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          # Only non-secret values go into the compose (visible in TEE metadata)
          export GIT_SHA=$(echo "$GIT_SHA_FULL" | cut -c1-7)
          envsubst < docker-compose.template.yml > docker-compose.deploy.yml
          cat docker-compose.deploy.yml

      - name: Generate encrypted env file
        run: |
          # Secrets go via --env-file (encrypted by Phala CLI, never in metadata)
          FIREBASE_CREDS=$(echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | tr -d '\n\r ')
          cat > .env.deploy <<'HEADER'
          # Hermes secrets — encrypted by Phala CLI before transmission
          HEADER
          {
            echo "BASE_URL=${{ secrets.BASE_URL }}"
            echo "FIREBASE_SERVICE_ACCOUNT_BASE64=${FIREBASE_CREDS}"
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
            echo "FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}"
            echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}"
            echo "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}"
            echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}"
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
            echo "TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}"
            echo "TELEGRAM_GROUP_CHAT_ID=${{ secrets.TELEGRAM_GROUP_CHAT_ID }}"
            echo "TELEGRAM_BOT_SECRET_KEY=${{ secrets.TELEGRAM_BOT_SECRET_KEY }}"
            echo "TELEGRAM_BOT_HANDLE=${{ secrets.TELEGRAM_BOT_HANDLE }}"
            echo "TELEGRAM_POST_MODE=${{ secrets.TELEGRAM_POST_MODE }}"
            echo "TELEGRAM_MAX_PER_HOUR=${{ secrets.TELEGRAM_MAX_PER_HOUR }}"
            echo "TELEGRAM_COOLDOWN_MS=${{ secrets.TELEGRAM_COOLDOWN_MS }}"
          } >> .env.deploy

      - name: Deploy to Phala Cloud
        run: |
          # Secrets encrypted via --env-file, never appear in public TEE metadata
          # NOTE: Switching to Base on-chain KMS requires recreating the CVM via the Phala dashboard.
          # See https://github.com/jameslbarnes/hermes/issues/4
          phala cvms upgrade ${{ secrets.PHALA_APP_ID }} --compose docker-compose.deploy.yml --env-file .env.deploy
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_API_KEY }}

      - name: Cleanup secrets
        if: always()
        run: rm -f docker-compose.deploy.yml .env.deploy

      - name: Wait for TEE to restart
        run: sleep 30

      - name: Archive evidences
        run: |
          TEE_HOST="${{ secrets.PHALA_APP_ID }}-8090.dstack-pha-prod9.phala.network"
          DATE=$(date -u +%Y-%m-%d)
          DIR="evidences/$DATE"
          mkdir -p "$DIR"

          # Fetch attestation artifacts from TEE metadata endpoint
          curl -sf "https://$TEE_HOST/" -o "$DIR/metadata-raw.json" || echo "Warning: could not fetch metadata"
          curl -sf "https://$TEE_HOST/quote" -o "$DIR/quote.json" || echo "Warning: could not fetch quote"

          # Redact secrets from metadata before committing
          if [ -f "$DIR/metadata-raw.json" ]; then
            sed -E 's/(ANTHROPIC_API_KEY|SENDGRID_API_KEY|FIREBASE_SERVICE_ACCOUNT_BASE64|FIRECRAWL_API_KEY|CLOUDFLARE_API_TOKEN|TELEGRAM_BOT_TOKEN|TELEGRAM_BOT_SECRET_KEY)=[^",\\]*/\1=[REDACTED]/g' \
              "$DIR/metadata-raw.json" > "$DIR/metadata.json"
            rm "$DIR/metadata-raw.json"
          fi

          # Record deployment context
          cat > "$DIR/deploy-info.json" <<EOF
          {
          "git_sha": "${{ github.sha }}",
          "git_sha_short": "$(echo ${{ github.sha }} | cut -c1-7)",
          "image_digest": "${{ needs.build.outputs.digest }}",
          "app_id": "${{ secrets.PHALA_APP_ID }}",
          "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          ls -la "$DIR"

      - name: Commit evidences to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evidences/
          if git diff --cached --quiet; then
            echo "No new evidences to commit"
          else
            git commit -m "chore: archive TEE evidences for $(date -u +%Y-%m-%d) deploy"
            git push
          fi

      - name: Deployment summary
        run: |
          echo "## Phala TEE Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to Phala Cloud CVM" >> $GITHUB_STEP_SUMMARY
          echo "**App ID:** \`${{ secrets.PHALA_APP_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image Digest:** \`${{ needs.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**KMS:** Pha (cloud) — Base on-chain KMS pending CVM recreation" >> $GITHUB_STEP_SUMMARY
          echo "**Evidences:** Archived to \`evidences/$(date -u +%Y-%m-%d)/\`" >> $GITHUB_STEP_SUMMARY
