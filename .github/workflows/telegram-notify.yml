name: Telegram Deploy Notification

on:
  push:
    branches: [master, main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          AUTHOR="${{ github.event.head_commit.author.username || github.event.head_commit.author.name }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          REPO="${{ github.repository }}"
          URL="https://github.com/${REPO}/commit/${SHA}"

          # Escape MarkdownV2 special chars
          escape() { echo "$1" | sed 's/[_*\[\]()~`>#+\-=|{}.!\\]/\\&/g'; }

          TEXT="$(escape "Deploy: ${COMMIT_MSG}")
          $(escape "by ${AUTHOR}") [$(escape "${SHORT_SHA}")]($(escape "${URL}"))"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHANNEL_ID}" \
            -d parse_mode=MarkdownV2 \
            -d disable_web_page_preview=true \
            -d text="${TEXT}"
