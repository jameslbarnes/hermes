version: '3.8'

services:
  hermes:
    image: docker.io/generalsemantics/hermes:${GIT_SHA}@${IMAGE_DIGEST}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STAGING_DELAY_MS=3600000
      - BASE_URL=${BASE_URL}
      - FIREBASE_SERVICE_ACCOUNT_BASE64=${FIREBASE_SERVICE_ACCOUNT_BASE64}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
      - TELEGRAM_GROUP_CHAT_ID=${TELEGRAM_GROUP_CHAT_ID}
      - TELEGRAM_BOT_SECRET_KEY=${TELEGRAM_BOT_SECRET_KEY}
      - TELEGRAM_BOT_HANDLE=${TELEGRAM_BOT_HANDLE}
      - TELEGRAM_POST_MODE=${TELEGRAM_POST_MODE}
      - TELEGRAM_MAX_PER_HOUR=${TELEGRAM_MAX_PER_HOUR}
      - TELEGRAM_COOLDOWN_MS=${TELEGRAM_COOLDOWN_MS}
    volumes:
      - hermes-data:/data
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "443:443"
    environment:
      - DOMAIN=hermes.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://hermes:3000
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data-cf:/etc/letsencrypt
    depends_on:
      - hermes
    restart: unless-stopped

volumes:
  hermes-data:
  cert-data-cf:
