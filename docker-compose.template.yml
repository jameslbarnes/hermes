version: '3.8'

services:
  hermes:
    image: docker.io/generalsemantics/hermes:${GIT_SHA}@${IMAGE_DIGEST}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STAGING_DELAY_MS=3600000
      - GIT_SHA=${GIT_SHA}
      - IMAGE_DIGEST=${IMAGE_DIGEST}
      - MODERATOR_HANDLES=router,hermes
      # Names only — values injected via encrypted --env-file at deploy time
      - BASE_URL
      - FIREBASE_SERVICE_ACCOUNT_BASE64
      - ANTHROPIC_API_KEY
      - MODERATOR_URL=https://8f20c29f45571bade4b63d0f704faa926af53e7c-3000.dstack-pha-prod5.phala.network
      - MODERATOR_API_KEY
      - SENDGRID_API_KEY
      - SENDGRID_FROM_EMAIL
      # Route Matrix DMs/@mentions through the external hermes-agent instead
      # of the legacy inline server-side mention handler.
      - HERMES_AGENT_HANDLES_MATRIX=1
      # Matrix platform — agent connects to this homeserver to DM users,
      # create rooms for introductions, and route notebook entries
      - MATRIX_SERVER_URL
      - MATRIX_SERVER_NAME
      - MATRIX_BOT_SECRET_KEY
      - MATRIX_BOT_HANDLE
      - MATRIX_REGISTRATION_TOKEN
      - MATRIX_SIGNUP_URL
      # One-shot recovery: rotate the Matrix device once if stale device keys
      # are causing SAS MAC mismatches. The app records a marker in /data.
      - MATRIX_FRESH_CRYPTO=once
    volumes:
      - hermes-data:/data
    restart: unless-stopped

  hermes-agent:
    image: docker.io/generalsemantics/hermes-agent:${GIT_SHA}@${AGENT_IMAGE_DIGEST}
    environment:
      # Names only — values injected via encrypted --env-file at deploy time
      - ANTHROPIC_API_KEY
      - HERMES_MCP_URL=http://hermes:3000/mcp/http
      - HERMES_SECRET_KEY
      - HERMES_HANDLE=router
      - TELEGRAM_BOT_TOKEN
      - GITHUB_TOKEN
    volumes:
      - hermes-data:/data
    depends_on:
      - hermes
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "443:443"
    environment:
      - DOMAIN=hermes.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://hermes:3000
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data-cf:/etc/letsencrypt
    depends_on:
      - hermes
    restart: unless-stopped

volumes:
  hermes-data:
  cert-data-cf:
