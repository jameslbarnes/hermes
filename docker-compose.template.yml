version: '3.8'

services:
  hermes:
    image: docker.io/generalsemantics/hermes:${GIT_SHA}@${IMAGE_DIGEST}
    ports:
      - "3000:3000"
    environment:
      # Non-secret config — visible in TEE metadata (this is intentional)
      - PORT=3000
      - STAGING_DELAY_MS=3600000
      - GIT_SHA=${GIT_SHA}
      - IMAGE_DIGEST=${IMAGE_DIGEST}
      # Secrets are injected via --env-file (encrypted, not visible in metadata)
    volumes:
      - hermes-data:/data
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "443:443"
    environment:
      - DOMAIN=hermes.teleport.computer
      - DNS_PROVIDER=cloudflare
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://hermes:3000
      # CLOUDFLARE_API_TOKEN injected via --env-file
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data-cf:/etc/letsencrypt
    depends_on:
      - hermes
    restart: unless-stopped

volumes:
  hermes-data:
  cert-data-cf:
