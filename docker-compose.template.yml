version: '3.8'

services:
  hermes:
    image: docker.io/generalsemantics/hermes:${GIT_SHA}@${IMAGE_DIGEST}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STAGING_DELAY_MS=3600000
      - GIT_SHA=${GIT_SHA}
      - IMAGE_DIGEST=${IMAGE_DIGEST}
      - MODERATOR_HANDLES=hermes
      # Names only — values injected via encrypted --env-file at deploy time
      - BASE_URL
      - FIREBASE_SERVICE_ACCOUNT_BASE64
      - ANTHROPIC_API_KEY
      - SENDGRID_API_KEY
      - SENDGRID_FROM_EMAIL
    volumes:
      - hermes-data:/data
    restart: unless-stopped

  hermes-agent:
    image: docker.io/generalsemantics/hermes-agent:latest@sha256:bee5250c6a4d7b0d063799c35306d299bd066e50ad97e50d6a2585a8141cb2d0
    environment:
      # Names only — values injected via encrypted --env-file at deploy time
      - ANTHROPIC_API_KEY
      - HERMES_MCP_URL=http://hermes:3000/mcp/http
      - HERMES_SECRET_KEY
      - TELEGRAM_BOT_TOKEN
      - GITHUB_TOKEN
    volumes:
      - agent-data:/root/.hermes
    depends_on:
      - hermes
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "443:443"
    environment:
      - DOMAIN=hermes.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://hermes:3000
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data-cf:/etc/letsencrypt
    depends_on:
      - hermes
    restart: unless-stopped

volumes:
  hermes-data:
  agent-data:
  cert-data-cf:
