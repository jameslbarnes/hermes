<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes - Redirecting...</title>
    <style>
        :root {
            --bg: #faf9f7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0b;
            }
        }
        body {
            background: var(--bg);
        }
    </style>
</head>
<body>
    <!-- setup.html has been split into /join, /settings, and /connect -->
    <script>
        const savedKey = localStorage.getItem('hermes_key');
        if (savedKey) {
            window.location.replace('/settings');
        } else {
            window.location.replace('/join');
        }
    </script>
</body>
</html>
